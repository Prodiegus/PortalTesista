server {
    listen 80;
    server_name portaltesista.me www.portaltesista.me;

    location /.well-known/pki-validation/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name portaltesista.me www.portaltesista.me;

    ssl_certificate /etc/nginx/certs/portaltesista_me.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_trusted_certificate /etc/nginx/certs/portaltesista_me.ca-bundle;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name keycloak.portaltesista.me;

    # Redirigir todo el tráfico HTTP a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name keycloak.portaltesista.me;

    # Configuración de certificados SSL
    ssl_certificate /etc/nginx/certs/portaltesista_me.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_trusted_certificate /etc/nginx/certs/portaltesista_me.ca-bundle;

    # Configuración del proxy reverso
    location / {
        proxy_pass https://localhost:8443;
        proxy_ssl_verify off;             
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}